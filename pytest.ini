[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
filterwarnings =
    # google-generativeai is deprecated in favour of google-genai.
    # Migration is tracked in ROADMAP.md. Suppress during tests to keep
    # output clean; this does not hide the issue — it is documented.
    ignore::FutureWarning:google
    ignore::DeprecationWarning:google
markers =
    unit: Pure unit tests with no external dependencies
    integration: Tests that spin up Flask test client
    slow: Tests that make real network calls (skipped in CI)
